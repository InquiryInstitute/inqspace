name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: [docs/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - run: npm ci
        working-directory: docs
      - run: npm run build
        working-directory: docs
        env:
          PUBLIC_INQSPACE_API_URL: ${{ secrets.PUBLIC_INQSPACE_API_URL }}
          # Each fork’s Pages build targets that repo (override with repo variable PUBLIC_IDE_DEMO_REPO if needed).
          PUBLIC_IDE_DEMO_REPO: ${{ vars.PUBLIC_IDE_DEMO_REPO || github.repository }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
